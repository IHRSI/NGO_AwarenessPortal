name: Deploy to Netlify

on:
  push:
    branches:
      - main # Change to 'master' if needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 🌟 THIS IS THE MAGIC VARIABLE THAT LIGHTS UP THE SIDEBAR 🌟
    environment:
      name: Production
      url: https://inamigosportal.netlify.app/ # OPTIONAL: Paste your exact Netlify URL here

    steps:
      # Step 1: Pull your files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Push files to Netlify 
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=.
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}